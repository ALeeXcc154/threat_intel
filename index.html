<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威胁情报生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .fade-in { animation: fadeIn .2s ease-out; }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    </style>
</head>

<body class="bg-gray-50 text-gray-700 h-screen flex overflow-hidden font-sans selection:bg-indigo-500 selection:text-white">

    <div class="flex-1 p-6 lg:p-10 overflow-y-auto custom-scrollbar flex flex-col transition-all duration-500 bg-gray-50/50">
        <div class="w-full max-w-[1600px] mx-auto h-full flex flex-col">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">威胁情报</h2>
                <p class="text-gray-500 text-sm mt-1">输入情报社区 URL 列表，一键式生成威胁情报月报文档</p>
            </div>

            <div class="bg-white rounded-3xl shadow-sm p-6 mb-6">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fa-solid fa-link mr-2"></i>情报社区 URL 列表 (每行一个 URL):
                    </label>
                    <textarea id="threat-urls" rows="6" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors" placeholder="https://x.threatbook.com/v5/article?threatInfoID=xxxxxx"></textarea>
                    <p class="mt-2 text-xs text-gray-500">请输入情报社区 URL 地址，每行一个 URL</p>
                </div>

                <div class="flex justify-end">
                    <button id="generate-intel-btn" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-magic"></i>
                        <span>生成情报文档</span>
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm p-6 flex-1 min-h-0 flex flex-col">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">处理日志</h3>
                <div id="intel-logs" class="flex-1 min-h-0 bg-gray-50 rounded-xl p-4 overflow-y-auto text-sm font-mono text-gray-700">
                    <p class="text-gray-400 italic">等待开始处理...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="w-80 2xl:w-[420px] bg-white border-l border-gray-200 flex flex-col flex-shrink-0 shadow-[-10px_0_30px_-10px_rgba(0,0,0,0.03)] z-30 relative">
        <div class="p-4 border-b border-gray-100">
            <h3 class="font-bold text-gray-800 text-lg">情报文档结果</h3>
            <p class="text-xs text-gray-400 mt-1">生成的威胁情报文档信息</p>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            <div id="intel-results" class="space-y-5">
                <div class="text-center text-gray-500 py-10">
                    <i class="fa-solid fa-file-circle-question text-4xl mb-3 text-gray-300"></i>
                    <p>暂无情报数据</p>
                    <p class="text-xs mt-1">输入 URL 并点击"生成情报文档"开始处理</p>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-100 bg-white shadow-[0_-4px_20px_-5px_rgba(0,0,0,0.05)] z-30">
            <button id="download-intel-btn" disabled class="w-full py-4 bg-gray-200 text-gray-400 rounded-xl font-bold transition-all duration-300 cursor-not-allowed flex items-center justify-center text-lg">
                <i class="fa-solid fa-download mr-2"></i>
                <span>等待处理完成</span>
            </button>
        </div>
    </div>

    <script>
    const apiService = {
        async analyzeThreat(url) {
            return axios.post('/api/v1/threat-intelligence/analyze', { url });
        },

        async downloadThreatIntel(results) {
            const response = await axios.post('/api/v1/threat-intelligence/report', { results }, {
                responseType: 'blob'
            });

            let filename = `威胁情报_${new Date().toISOString().slice(0, 10)}.docx`;
            const contentDisposition = response.headers['content-disposition'];
            if (contentDisposition) {
                const utf8FilenameRegex = /filename\*=UTF-8''([^;\r\n]+)/i;
                const utf8Match = contentDisposition.match(utf8FilenameRegex);
                if (utf8Match && utf8Match[1]) {
                    filename = decodeURIComponent(utf8Match[1]);
                }
            }

            const blobUrl = window.URL.createObjectURL(response.data);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
            return true;
        }
    };

    const ThreatIntel = {
        urls: [],
        results: [],
        isProcessing: false,

        init() {
            const generateBtn = document.getElementById('generate-intel-btn');
            const downloadBtn = document.getElementById('download-intel-btn');

            if (generateBtn) {
                generateBtn.addEventListener('click', () => this.generateIntel());
            }

            if (downloadBtn) {
                downloadBtn.addEventListener('click', () => this.downloadIntel());
            }
        },

        async generateIntel() {
            const urlInput = document.getElementById('threat-urls');
            const urlsText = urlInput.value.trim();

            if (!urlsText) {
                this.addLog('请输入有效的 URL 地址', 'error');
                return;
            }

            this.urls = urlsText.split('\n').map(url => url.trim()).filter(url => url);

            if (this.urls.length === 0) {
                this.addLog('❌ 请输入有效的 URL', 'error');
                return;
            }

            this.isProcessing = true;
            this.results = [];
            this.updateGenerateButton();
            this.clearLogs();
            this.clearResults();
            this.addLog(`🚀 开始处理 ${this.urls.length} 个 URL...`);

            try {
                for (let i = 0; i < this.urls.length; i++) {
                    const url = this.urls[i];
                    this.addLog(`\n[${i + 1}/${this.urls.length}] 处理：${url}`);

                    const result = await this.processURL(url);
                    this.results.push(result);

                    if (result.success) {
                        this.addLog(`✅ 成功：提取了 ${result.entryCount} 个条目`);
                    } else {
                        this.addLog(`❌ 失败：${result.error}`, 'error');
                    }
                }

                const successCount = this.results.filter(r => r.success).length;
                const totalEntries = this.results.filter(r => r.success).reduce((sum, r) => sum + r.entryCount, 0);

                this.addLog(`\n✨ 处理完成！成功：${successCount}/${this.urls.length}，总条目：${totalEntries}`);
                this.showSummaryResult(successCount, totalEntries);
                this.updateDownloadButton();
            } catch (error) {
                this.addLog(`\n❌ 处理出错：${error.message}`, 'error');
            } finally {
                this.isProcessing = false;
                this.updateGenerateButton();
            }
        },

        async processURL(url) {
            try {
                const { data } = await apiService.analyzeThreat(url);

                if (data.success) {
                    return {
                        success: true,
                        url: url,
                        entries: data.entries,
                        entryCount: data.entries.length,
                        title: data.title || '威胁情报'
                    };
                } else {
                    return {
                        success: false,
                        url: url,
                        error: data.error || '未知错误'
                    };
                }
            } catch (error) {
                return {
                    success: false,
                    url: url,
                    error: error.message
                };
            }
        },

        addLog(message, type = 'info') {
            const logsContainer = document.getElementById('intel-logs');
            const logEntry = document.createElement('p');

            let colorClass = 'text-gray-700';
            if (type === 'error') {
                colorClass = 'text-red-600';
            } else if (type === 'success') {
                colorClass = 'text-green-600';
            } else if (message.includes('✅')) {
                colorClass = 'text-green-600';
            } else if (message.includes('❌')) {
                colorClass = 'text-red-600';
            } else if (message.includes('🚀')) {
                colorClass = 'text-indigo-600';
            } else if (message.includes('✨')) {
                colorClass = 'text-indigo-600';
            }

            logEntry.className = colorClass;
            logEntry.textContent = message;
            logsContainer.appendChild(logEntry);
            logsContainer.scrollTop = logsContainer.scrollHeight;
        },

        clearLogs() {
            document.getElementById('intel-logs').innerHTML = '';
        },

        clearResults() {
            document.getElementById('intel-results').innerHTML = `
                <div class="text-center text-gray-500 py-10">
                    <i class="fa-solid fa-file-circle-question text-4xl mb-3 text-gray-300"></i>
                    <p>暂无情报数据</p>
                    <p class="text-xs mt-1">输入 URL 并点击"生成情报文档"开始处理</p>
                </div>
            `;
        },

        showSummaryResult(successCount, totalEntries) {
            document.getElementById('intel-results').innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-file-lines text-xl text-indigo-600"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-gray-800">威胁情报汇总报告</p>
                        <p class="text-xs text-gray-400 mt-0.5">已整合所有 URL 的情报内容</p>
                    </div>
                </div>
                
                <div class="space-y-3">
                    <div class="bg-gray-50 rounded-xl p-4">
                        <div class="flex items-center gap-2.5">
                            <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center">
                                <i class="fa-solid fa-check-circle text-indigo-600 text-sm"></i>
                            </div>
                            <div>
                                <p class="text-2xl font-bold text-gray-800">${successCount}</p>
                                <p class="text-xs text-gray-500 mt-0.5">成功 URL</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-4">
                        <div class="flex items-center gap-2.5">
                            <div class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center">
                                <i class="fa-solid fa-list-check text-purple-600 text-sm"></i>
                            </div>
                            <div>
                                <p class="text-2xl font-bold text-gray-800">${totalEntries}</p>
                                <p class="text-xs text-gray-500 mt-0.5">总条目数</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        },

        updateGenerateButton() {
            const btn = document.getElementById('generate-intel-btn');
            if (this.isProcessing) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i><span>处理中...</span>';
                btn.className = 'px-6 py-3 bg-gray-400 text-white rounded-xl font-medium transition-colors flex items-center gap-2 cursor-not-allowed';
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-magic"></i><span>生成情报文档</span>';
                btn.className = 'px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-colors flex items-center gap-2';
            }
        },

        updateDownloadButton() {
            const btn = document.getElementById('download-intel-btn');
            const successCount = this.results.filter(r => r.success).length;

            if (successCount > 0) {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-download"></i><span>下载文档</span>`;
                btn.className = 'w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition-all duration-300 flex items-center justify-center gap-2';
            } else {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-download"></i><span>等待处理完成</span>';
                btn.className = 'w-full py-3 bg-gray-200 text-gray-400 rounded-xl font-semibold transition-all duration-300 cursor-not-allowed flex items-center justify-center gap-2';
            }
        },

        async downloadIntel() {
            const successfulResults = this.results.filter(r => r.success);

            if (successfulResults.length === 0) {
                return;
            }

            try {
                this.addLog('📥 正在生成文档...');
                await apiService.downloadThreatIntel(successfulResults);
                this.addLog('✅ 文档下载成功!', 'success');
            } catch (error) {
                this.addLog(`❌ 下载失败：${error.message}`, 'error');
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        ThreatIntel.init();
    });
    </script>
</body>

</html>
